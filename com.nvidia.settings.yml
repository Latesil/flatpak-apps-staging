id: com.nvidia.settings
sdk: org.freedesktop.Sdk
runtime: org.freedesktop.Platform
runtime-version: "18.08"
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
command: nvidia-settings
rename-desktop-file: nvidia-settings.desktop
rename-icon: nvidia-settings
modules:

  - name: nvidia-settings
    no-autogen: true
    make-args:
      - PREFIX=/app
      - DO_STRIP=
    make-install-args:
      - PREFIX=/app
    post-install:
      - install -Dm644 doc/nvidia-settings.desktop -t /app/share/applications/
      - install -Dm644 doc/nvidia-settings.png -t /app/share/icons/hicolor/128x128/apps/
      - sed
        -e 's|__UTILS_PATH__/||'
        -e 's|__NVIDIA_SETTINGS_DESKTOP_CATEGORIES__|System;Settings;|'
        -i /app/share/applications/nvidia-settings.desktop
    sources:
      - type: archive
        url: "https://download.nvidia.com/XFree86/nvidia-settings/nvidia-settings-430.14.tar.bz2"
        sha256: f91232747bc255e652f0baada664ce0ffbc84c2a165f58456ca1db418fd63300
    modules:

      - shared-modules/gtk2/gtk2.json
