id: com.epsxe.ePSXe
sdk: org.freedesktop.Sdk
runtime: org.freedesktop.Platform
runtime-version: "18.08"
command: epsxe
rename-icon: epsxe
rename-desktop-file: epsxe.desktop
rename-appdata-file: epsxe.appdata.xml
finish-args:
  - --share=ipc
  - --socket=x11
  - --device=all
  - --socket=pulseaudio
  - --persist=.epsxe
add-extensions:
  com.epsxe.ePSXe.plugin:
    directory: lib/epsxe
    subdirectories: true
    no-autodownload: true
    merge-dirs: cfg;plugins;
    add-ld-path: plugins
cleanup:
  - "*.a"
  - "*.la"
  - /include
  - /lib/pkgconfig
  - /share/man
modules:
  - shared-modules/SDL/SDL-1.2.15.json
  - shared-modules/SDL/SDL_ttf-2.0.11.json

  - name: ncurses
    config-opts:
      - --with-abi-version=5
      - --with-shared
      - --with-chtype=long
      - --with-termlib=tinfo
      - --without-progs
    sources:
      - type: archive
        url: "https://invisible-mirror.net/archives/ncurses/current/ncurses-6.1-20181201.tgz"
        sha256: 702ff9added8b776f29a461acb053f348ae6391fa19c0570c78fa99ce4c3ca8a

  - name: epsxe
    buildsystem: simple
    build-commands:
      - install -Dm755 epsxe.sh /app/bin/epsxe
      - install -Dm755 apply_extra.sh /app/bin/apply_extra
      - mkdir -p /app/lib/epsxe/{cfg,plugins}
    sources:
      - type: script
        dest-filename: apply_extra.sh
        commands:
          - unzip ePSXe.zip
          - test -f epsxe_x64 && mv -n epsxe_x64 ePSXe
          - chmod +x ePSXe
          - ln -s ../lib/epsxe/cfg .
          - ln -s ../lib/epsxe/plugins .
          - rm ePSXe.zip

      - type: script
        dest-filename: epsxe.sh
        commands:
          - exec /app/extra/ePSXe $@

      - type: extra-data
        only-arches:
          - "i386"
        filename: ePSXe.zip
        url: "http://www.epsxe.com/files/ePSXe205linux.zip"
        sha256: 740e1ccc4ccd88ced688098b8e1d28d2fd23666e906d2ed19da794aa28a3e798
        size: 1225227

      - type: extra-data
        only-arches:
          - "x86_64"
        filename: ePSXe.zip
        url: "http://www.epsxe.com/files/ePSXe205linux_x64.zip"
        sha256: 60a99db5f400328bebe0a972caea6206d1a24d59a092248c0b5fc12e184eca99
        size: 1323391

  - name: epsxe-data
    buildsystem: simple
    build-commands:
      - for s in 16 24 32 48 64 128 256 512; do
          icondir=/app/share/icons/hicolor/${s}x${s}/apps ;
          mkdir -p $icondir ;
          rsvg-convert --output $icondir/epsxe.png --width=${s} --height=${s} epsxe.svg ;
        done
      - install -Dm644 epsxe.desktop -t /app/share/applications
      - install -Dm644 epsxe.appdata.xml -t /app/share/appdata
    sources:
      - type: file
        path: epsxe.svg
      - type: file
        path: epsxe.desktop
      - type: file
        path: epsxe.appdata.xml
