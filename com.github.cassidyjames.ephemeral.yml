id: com.github.cassidyjames.ephemeral
sdk: org.gnome.Sdk
runtime: org.gnome.Platform
runtime-version: "3.30"
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --share=network
  - --talk-name=org.gtk.vfs
  - --talk-name=org.gtk.vfs.*
  - --filesystem=xdg-run/dconf
  - --filesystem=xdg-config/dconf:ro
  - --talk-name=ca.desrt.dconf
cleanup:
  - "*.a"
  - "*.la"
  - /include
  - /lib/pkgconfig
  - /share/vala
  - /share/gir-1.0
modules:
  - name: ephemeral
    buildsystem: meson
    sources:
      - type: git
        url: "https://github.com/cassidyjames/ephemeral.git"
        tag: "3.0.0"
    modules:

        - name: granite
          buildsystem: cmake-ninja
          config-opts:
            - -DCMAKE_BUILD_TYPE=RelWithDebInfo
            - -DCMAKE_INSTALL_LIBDIR=/app/lib
            - -DINTROSPECTION_GIRDIR=/app/share/gir-1.0
            - -DINTROSPECTION_TYPELIBDIR=/app/lib/girepository-1.0
          cleanup:
            - /bin
            - /share/applications
          sources:
            - type: archive
              url: "https://github.com/elementary/granite/archive/5.2.2.tar.gz"
              sha256: a2bfb717570b2b7ffef8715fae0dcabe7e3de21f6cb9392f1184a57ae6436f6c
          modules:

            - name: libgee
              make-install-args:
                - girdir=/app/share/gir-1.0
                - typelibdir=/app/lib/girepository-1.0
              sources:
                - type: archive
                  url: "https://download.gnome.org/sources/libgee/0.20/libgee-0.20.1.tar.xz"
                  sha256: bb2802d29a518e8c6d2992884691f06ccfcc25792a5686178575c7111fea4630
