id: org.kde.falkon
sdk: org.kde.Sdk
runtime: org.kde.Platform
runtime-version: "5.12"
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --share=network
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.kwalletd5
  - --system-talk-name=org.freedesktop.GeoClue2
  - --system-talk-name=net.connman
  - --system-talk-name=org.freedesktop.NetworkManager
  - --filesystem=xdg-download
rename-icon: falkon
command: falkon
cleanup:
  - "*.a"
  - "*.la"
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /share/man
modules:

  - name: falkon
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: "https://download.kde.org/stable/falkon/3.1/falkon-3.1.0.tar.xz"
        sha256: ce743cd80c0e2d525a784e29c9b487f73480119b0567f9ce8ef1f44cca527587
    modules:

      - name: libgnome-keyring
        config-opts:
          - --disable-static
          - --disable-gtk-doc
          - --disable-coverage
          - --disable-introspection
        sources:
          - type: archive
            url: "https://download.gnome.org/sources/libgnome-keyring/3.12/libgnome-keyring-3.12.0.tar.xz"
            sha256: c4c178fbb05f72acc484d22ddb0568f7532c409b0a13e06513ff54b91e947783

      - name: kf5-purpose
        buildsystem: cmake-ninja
        sources:
          - type: archive
            url: "https://download.kde.org/stable/frameworks/5.56/purpose-5.56.0.tar.xz"
            sha256: 882aa64c55e134d1aff06d533f8c3c6f8e5886b5b782925e1aad2e0ca7e37e67
