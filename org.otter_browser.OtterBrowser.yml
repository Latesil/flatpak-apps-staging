id: org.otter_browser.OtterBrowser
sdk: org.kde.Sdk
runtime: org.kde.Platform
runtime-version: "5.12"
#base: io.qt.qtwebkit.BaseApp
#base-version: "5.12"
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --share=network
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-download
rename-icon: otter-browser
rename-desktop-file: otter-browser.desktop
rename-appdata-file: otter-browser.appdata.xml
command: otter-browser
cleanup:
  - "*.a"
  - "*.la"
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /share/man
cleanup-commands:
  - rm -rfv /app/{include,lib/{pkgconfig,cmake}}
modules:

  - name: otter-browser
    buildsystem: cmake-ninja
    post-install:
      - install -Dm644 packaging/otter-browser.appdata.xml /app/share/appdata/${FLATPAK_ID}.appdata.xml
    sources:
      - type: archive
        url: "https://github.com/OtterBrowser/otter-browser/archive/v1.0.01.tar.gz"
        sha256: 85aef7c74277cf94de237e516c3c2d507b3d19b9ad16853de938540b8bf2f16b
    modules:

      - name: hunspell
        sources:
          - type: archive
            url: "https://github.com/hunspell/hunspell/archive/v1.6.2.tar.gz"
            sha256: 3cd9ceb062fe5814f668e4f22b2fa6e3ba0b339b921739541ce180cac4d6f4c4
          - type: script
            dest-filename: autogen.sh
            commands:
              - autoreconf -vfi
