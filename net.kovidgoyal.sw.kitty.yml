id: net.kovidgoyal.sw.kitty
sdk: org.freedesktop.Sdk
runtime: org.freedesktop.Platform
runtime-version: "18.08"
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
command: kitty
rename-icon: kitty
rename-desktop-file: kitty.desktop
cleanup:
  - "*.a"
  - "*.la"
  - /include
  - /lib/pkgconfig
  - /share/pkgconfig
  - /share/man
  - /share/doc
modules:

  - name: kitty
    buildsystem: simple
    build-commands:
      - python3 setup.py linux-package --prefix=/app
    sources:
      - type: archive
        url: "https://github.com/kovidgoyal/kitty/archive/v0.13.3.tar.gz"
        sha256: b6f48404349ca99049de40e7bb55511de9ea04a6b1567068997d3fddb2c20f08
    cleanup:
      - /cache
    modules:

      - name: wayland-protocols
        rm-configure: true
        sources:
          - type: archive
            url: "https://wayland.freedesktop.org/releases/wayland-protocols-1.17.tar.xz"
            sha256: df1319cf9705643aea9fd16f9056f4e5b2471bd10c0cc3713d4a4cdc23d6812f
          - type: script
            dest-filename: autogen.sh
            commands:
             - exec autoreconf -ifv

      - python3-sphinx.json