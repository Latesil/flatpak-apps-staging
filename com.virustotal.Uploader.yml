id: com.virustotal.Uploader
sdk: org.kde.Sdk
runtime: org.kde.Platform
runtime-version: "5.12"
command: VirusTotalUploader
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
cleanup:
  - "*.a"
  - "*.la"
  - /include
  - /lib/pkgconfig
modules:
  - name: jansson
    sources:
      - type: archive
        url: "https://github.com/akheron/jansson/archive/v2.12.tar.gz"
        sha256: 76260d30e9bbd0ef392798525e8cd7fe59a6450c54ca6135672e3cd6a1642941
      - type: script
        dest-filename: autogen.sh
        commands:
          - autoreconf -ifv

  - name: c-vtapi
    sources:
      - type: git
        url: "https://github.com/VirusTotal/c-vtapi.git"
        commit: 0e525b2
      - type: script
        dest-filename: autogen.sh
        commands:
          - autoreconf -ifv

  - name: qt-virustotal-uploader
    buildsystem: qmake
    config-opts:
      - LIBS+=-L/app/lib
    post-install:
      - install -Dm755 VirusTotalUploader -t /app/bin
      - install -Dm644 vtlogo-sigma.png /app/share/icons/hicolor/128x128/apps/${FLATPAK_ID}.png
      - install -Dm644 ${FLATPAK_ID}.desktop -t /app/share/applications
      - install -Dm644 ${FLATPAK_ID}.appdata.xml -t /app/share/appdata
    sources:
      - type: git
        url: "https://github.com/VirusTotal/qt-virustotal-uploader.git"
        commit: 7ee9b45
      - type: file
        path: com.virustotal.Uploader.desktop
      - type: file
        path: com.virustotal.Uploader.appdata.xml
