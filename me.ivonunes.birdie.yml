id: me.ivonunes.birdie
runtime: org.gnome.Platform
sdk: org.gnome.Sdk
runtime-version: "3.30"
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --socket=pulseaudio
command: me.ivonunes.birdie
cleanup:
  - "*.a"
  - "*.la"
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /share/man
modules:
  - name: birdie
    buildsystem: meson
    sources:
      - type: git
        url: "https://github.com/ivonunes/birdie.git"
    modules:
      - name: gtksourceview
        sources:
          - type: archive
            url: "https://download.gnome.org/sources/gtksourceview/3.24/gtksourceview-3.24.9.tar.xz"
            sha256: 699d76a453e6a3d3331906346e3dbfa25f2cbc9ec090e46635e9c6bb595e07c2

      - name: rest
        sources:
          - type: archive
            url: "https://download.gnome.org/sources/rest/0.8/rest-0.8.1.tar.xz"
            sha256: 0513aad38e5d3cedd4ae3c551634e3be1b9baaa79775e53b2dba9456f15b01c9

      - name: granite
        buildsystem: cmake-ninja
        config-opts:
          - -DCMAKE_BUILD_TYPE=RelWithDebInfo
          - -DCMAKE_INSTALL_LIBDIR=/app/lib
          - -DINTROSPECTION_GIRDIR=/app/share/gir-1.0
          - -DINTROSPECTION_TYPELIBDIR=/app/lib/girepository-1.0
        cleanup:
          - /bin
          - /share/applications
        sources:
          - type: archive
            url: "https://github.com/elementary/granite/archive/5.2.2.tar.gz"
            sha256: a2bfb717570b2b7ffef8715fae0dcabe7e3de21f6cb9392f1184a57ae6436f6c
        modules:
          - name: libgee
            make-install-args:
              - girdir=/app/share/gir-1.0
              - typelibdir=/app/lib/girepository-1.0
            sources:
              - type: archive
                url: "https://download.gnome.org/sources/libgee/0.20/libgee-0.20.1.tar.xz"
                sha256: bb2802d29a518e8c6d2992884691f06ccfcc25792a5686178575c7111fea4630

      - name: pidgin
        config-opts:
          - --disable-gtkui
          - --disable-consoleui
          - --disable-tcl
          - --disable-screensaver
          - --disable-vv
          - --disable-idn
          - --disable-meanwhile
          - --disable-avahi
          - --disable-nm
          - --disable-perl
        sources:
          - type: archive
            url: "https://downloads.sourceforge.net/project/pidgin/Pidgin/2.13.0/pidgin-2.13.0.tar.bz2"
            sha256: 2747150c6f711146bddd333c496870bfd55058bab22ffb7e4eb784018ec46d8f
