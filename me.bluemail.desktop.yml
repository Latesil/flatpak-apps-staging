id: me.bluemail.desktop
sdk: org.freedesktop.Sdk
runtime: org.freedesktop.Platform
runtime-version: "19.08"
base: org.electronjs.Electron2.BaseApp
base-version: "19.08"
tags:
  - proprietary
command: bluemail
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --share=network
  - --talk-name=org.gnome.GConf
  - --system-talk-name=org.freedesktop.login1
cleanup:
  - /lib/*.a
  - /lib/*.la
  - /include
  - /lib/pkgconfig
  - /share/man
  - /share/doc
modules:

  - name: bluemail
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra.sh /app/bin/apply_extra
      - install -Dm755 bluemail.sh /app/bin/bluemail
      - install -Dm755 /{usr,app}/bin/desktop-file-edit
    sources:
      - type: extra-data
        filename: bluemail.snap
        url: "https://api.snapcraft.io/api/v1/snaps/download/ZVlj0qw0GOFd5JgTfL8kk2Y5eIG1IpiH_3.snap"
        sha256: 904156bb91d7575181275ad9a2ca4098c79df478122784ec5e5b378855cd7f83
        size: 117538816

      - type: file
        path: apply_extra.sh

      - type: script
        dest-filename: bluemail.sh
        commands:
          - cd /app/extra/bluemail
          - exec ./bluemail --no-sandbox "$@"
    modules:

      - name: squashfs-tools
        subdir: squashfs-tools
        no-autogen: true
        make-args:
          - XZ_SUPPORT=1
          - LZO_SUPPORT=1
          - LZMA_XZ_SUPPORT=1
          - LZ4_SUPPORT=1
          - ZSTD_SUPPORT=1
        make-install-args:
          - INSTALL_DIR=$(FLATPAK_DEST)/bin
        sources:
          - type: archive
            url: "https://github.com/plougher/squashfs-tools/archive/4.4.tar.gz"
            sha256: a7fa4845e9908523c38d4acf92f8a41fdfcd19def41bd5090d7ad767a6dc75c3
        modules:

          - name: lzo
            config-opts:
              - --enable-shared
              - --disable-static
            sources:
              - type: archive
                url: "https://www.oberhumer.com/opensource/lzo/download/lzo-2.10.tar.gz"
                sha1: 4924676a9bae5db58ef129dc1cebce3baa3c4b5d

          - name: lz4
            no-autogen: true
            make-install-args:
              - PREFIX=$(FLATPAK_DEST)
            sources:
              - type: archive
                url: "https://github.com/lz4/lz4/archive/v1.9.2.tar.gz"
                sha256: 658ba6191fa44c92280d4aa2c271b0f4fbc0e34d249578dd05e50e76d0e5efcc

          - name: zstd
            no-autogen: true
            make-install-args:
              - PREFIX=$(FLATPAK_DEST)
            cleanup:
              - /bin
            sources:
              - type: archive
                url: "https://github.com/facebook/zstd/releases/download/v1.4.3/zstd-1.4.3.tar.gz"
                sha256: e88ec8d420ff228610b77fba4fbf22b9f8b9d3f223a40ef59c9c075fcdad5767
