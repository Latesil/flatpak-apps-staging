id: io.github.jwilm.Alacritty
sdk: org.freedesktop.Sdk
runtime: org.freedesktop.Platform
runtime-version: "18.08"
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: alacritty
rename-desktop-file: alacritty.desktop
rename-icon: alacritty
cleanup:
  - "*.a"
  - "*.la"
  - /include
  - /lib/pkgconfig
modules:

  - name: alacritty
    build-options:
      append-path : /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/alacritty/cargo
    buildsystem: simple
    build-commands:
      - cargo build --release -j ${FLATPAK_BUILDER_N_JOBS}
      - cargo install --path . --root /app
    post-install:
      - install -Dm644 extra/linux/alacritty.desktop -t /app/share/applications/
      - install -Dm644 extra/logo/alacritty-term.svg /app/share/icons/hicolor/scalable/apps/alacritty.svg
      - |
        for s in 16 32 64 128 256 512; do
          icondir=/app/share/icons/hicolor/${s}x${s}/apps
          mkdir -p ${icondir}
          rsvg-convert -w ${s} -a -o ${icondir}/alacritty.png extra/logo/alacritty-term.svg
        done
    sources:
      - type: archive
        url: "https://github.com/jwilm/alacritty/archive/v0.3.2.tar.gz"
        sha256: e2bc5323d505d9d487b2fdfc29f82a77e18b17f92de3988742950471808272f7
      - generated-sources.json

  - name: xclip
    sources:
      - type: archive
        url: "https://github.com/astrand/xclip/archive/0.13.tar.gz"
        sha256: ca5b8804e3c910a66423a882d79bf3c9450b875ac8528791fb60ec9de667f758
    modules:

      - name: libXmu
        sources:
          - type: archive
            url: "https://www.x.org/releases/individual/lib/libXmu-1.1.3.tar.gz"
            sha256: 5bd9d4ed1ceaac9ea023d86bf1c1632cd3b172dce4a193a72a94e1d9df87a62e
