id: io.ulauncher.Ulauncher
sdk: org.gnome.Sdk
runtime: org.gnome.Platform
runtime-version: "3.34"
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --own-name=net.launchpad.ulauncher
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --share=network
  - --env=PYTHONUSERBASE=/var/data/python
command: ulauncher
rename-icon: ulauncher
rename-desktop-file: ulauncher.desktop
cleanup:
  - "*.a"
  - "*.la"
  - /include
  - /lib/pkgconfig
  - /share/gir-1.0
  - /share/man
  - /share/gtk-doc
modules:

  - name: Ulauncher
    buildsystem: simple
    build-commands:
      - python3 setup.py install --prefix=/app --root=/
    sources:
      - type: archive
        url: "https://github.com/Ulauncher/Ulauncher/releases/download/5.6.1/ulauncher_5.6.1.tar.gz"
        sha256: 746dd15e5845061e0d523de94bf6670145389d038e11ac60a38d72542e456692
    modules:

      - pypi-dependencies.json

      - name: python-distutils-extra
        buildsystem: simple
        build-commands:
          - python3 setup.py install --prefix=/app --root=/
        sources:
          - type: archive
            url: "https://launchpad.net/python-distutils-extra/trunk/2.39/+download/python-distutils-extra-2.39.tar.gz"
            sha256: 723f24f4d65fc8d99b33a002fbbb3771d4cc9d664c97085bf37f3997ae8063af
        cleanup:
          - "*"
        modules:

          - shared-modules/intltool/intltool-0.51.json

      - shared-modules/libappindicator/libappindicator-gtk3-introspection-12.10.json

      - name: keybinder-3.0
        sources:
          - type: archive
            url: "https://github.com/kupferlauncher/keybinder/releases/download/keybinder-3.0-v0.3.2/keybinder-3.0-0.3.2.tar.gz"
            sha256: e6e3de4e1f3b201814a956ab8f16dfc8a262db1937ff1eee4d855365398c6020

      - name: dbus-python
        config-opts:
          - PYTHON_VERSION=3
        sources:
          - type: archive
            url: "https://dbus.freedesktop.org/releases/dbus-python/dbus-python-1.2.16.tar.gz"
            sha256: 11238f1d86c995d8aed2e22f04a1e3779f0d70e587caffeab4857f3c662ed5a4

      - python3-python-Levenshtein.json
      - python3-pyinotify.json
      - python3-websocket-client.json
      - python3-pyxdg.json
